name: ctxpack

on:
  pull_request:

jobs:
  context-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install ctxpack
        run: go install github.com/ilyaux/ctxpack/cmd/ctxpack@latest

      - name: Build PR context pack
        run: |
          ctxpack ci \
            --base origin/${{ github.base_ref }} \
            --budget 12000 \
            --forbid "services/auth/**,apps/admin/**" \
            "review this pull request"

      - name: Upload ctxpack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctxpack-pr-context
          path: |
            .ctxpack/ci-context.md
            reports/ctxpack-diff-summary.json
